<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | PflegeDeutsch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6">
    <style>
        .modern-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 5%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); }
        .header-left { display: flex; gap: 12px; justify-content: flex-start; }
        .header-center { text-align: center; }
        .brand-logo { text-decoration: none; display: block; transition: transform 0.2s; }
        .brand-logo:hover { transform: scale(1.05); }
        .brand-logo h1 { margin: 0; font-size: 1.8rem; color: var(--text-dark); letter-spacing: -0.5px; font-weight: 800; }
        .brand-logo span { color: var(--primary); }
        .brand-subtitle { margin: 0; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; justify-content: flex-end; }
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; align-items: center;}
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; padding: 8px 12px; border-radius: 12px; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); background: rgba(234, 88, 12, 0.1); transform: translateY(-2px); }
        @media (max-width: 850px) { .modern-header { grid-template-columns: 1fr; gap: 15px; padding: 15px; } .header-left { justify-content: center; } .header-right { justify-content: center; width: 100%; } .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px; } }

        .page-container { max-width: 600px; margin: 40px auto; padding: 30px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; }
        .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .submit-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header class="modern-header">
        <div class="header-left">
            <a href="index.html" style="text-decoration: none; color: var(--text-dark); font-weight: bold; padding: 8px 15px; background: var(--switch-bg); border-radius: 20px; font-size: 0.9rem;">&larr; Ana Sayfa</a>
        </div>
        <div class="header-center">
            <a href="index.html" class="brand-logo">
                <h1>med-<span>vokabeln</span></h1>
            </a>
            <p class="brand-subtitle">Pflegefachkräfte Trainer</p>
        </div>
        <div class="header-right">
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="telc.html" style="color: var(--primary); border: 1px solid var(--primary); background: rgba(234, 88, 12, 0.05);">telc Hazırlık 🔥</a></li>
                    <li><a href="rehber.html">Rehber</a></li>
                    <li><a href="hakkimizda.html">Hakkımızda</a></li>
                    <li><a href="iletisim.html" class="active">İletişim</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="page-container">
        <h1 style="color: var(--primary); margin-bottom: 20px;">İletişim</h1>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Soru veya önerileriniz için bize ulaşın.</p>
        <p style="font-weight: bold; margin-bottom: 20px;">✉️ info@med-vokabeln.com</p>
        <form onsubmit="event.preventDefault(); alert('Mesajınız alındı!');">
            <div class="form-group"><label>Adınız</label><input type="text" required></div>
            <div class="form-group"><label>E-Posta</label><input type="email" required></div>
            <div class="form-group"><label>Mesajınız</label><textarea required></textarea></div>
            <button type="submit" class="submit-btn">Gönder</button>
        </form>
    </div>

    <footer style="width: 100%; text-align: center; margin-bottom: 30px; font-size: 0.85rem;">
        <div style="margin-bottom: 10px;">
            <a href="datenschutz.html" style="color: var(--primary); text-decoration: none; margin: 0 10px;">Datenschutzerklärung</a>
            <span style="color: var(--text-muted);">|</span>
            <a href="iletisim.html" style="color: var(--primary); text-decoration: none; margin: 0 10px;">Kontakt</a>
        </div>
        <div style="color: var(--text-muted); margin-top: 10px; font-weight: 600;">
            © 2026 Oluşturan Azad | Tüm Hakları Saklıdır
        </div>
    </footer>
</body>
</html>
