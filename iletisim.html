<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5935458968037999" crossorigin="anonymous"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <title>İletişim | PflegeDeutsch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=11">
    <style>
        :root { --primary: #FFCC00; --bg-body: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-muted: #a3a3a3; --border-color: #333333; --switch-bg: #2a2a2a; }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* MODERN HEADER */
        .modern-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 5%; background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); box-sizing: border-box; width: 100%;}
        .header-left { display: flex; gap: 12px; justify-content: flex-start; }
        .header-center { text-align: center; }
        .brand-logo { text-decoration: none; display: block; transition: transform 0.2s; }
        .brand-logo:hover { transform: scale(1.05); }
        .brand-logo h1 { margin: 0; font-size: 1.8rem; color: var(--text-main); letter-spacing: -0.5px; font-weight: 800; }
        .brand-logo span { color: var(--primary); }
        .brand-subtitle { margin: 0; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; justify-content: flex-end; }
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; align-items: center;}
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; padding: 8px 12px; border-radius: 12px; }
        .nav-links a:hover, .nav-links a.active { color: #000; background: var(--primary); transform: translateY(-2px); }
        @media (max-width: 850px) { .modern-header { grid-template-columns: 1fr; gap: 15px; padding: 15px; } .header-left, .header-right { justify-content: center; width: 100%; } .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px; } }

        .page-container { max-width: 600px; width: 90%; margin: 50px auto; padding: 40px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border-color); box-sizing: border-box; flex: 1; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; border: 1px solid var(--border-color); border-radius: 12px; font-family: inherit; background: var(--bg-body); color: var(--text-main); font-size: 1rem; box-sizing: border-box; transition: 0.2s;}
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .submit-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);}
        .submit-btn:hover { transform: translateY(-2px); background: var(--primary-hover); }
    </style>
</head>
<body>

    <header class="modern-header">
        <div class="header-left">
            <a href="index.html" style="text-decoration: none; color: var(--text-main); font-weight: bold; padding: 8px 15px; background: var(--switch-bg); border-radius: 20px; font-size: 0.9rem; border: 1px solid var(--border-color);">&larr; <span data-tr="Ana Sayfa" data-en="Home">Ana Sayfa</span></a>
        </div>
        <div class="header-center">
            <a href="index.html" class="brand-logo">
                <h1>med-<span>vokabeln</span></h1>
            </a>
            <p class="brand-subtitle" data-tr="Pflegefachkräfte Trainer" data-en="Nursing Trainer">Pflegefachkräfte Trainer</p>
        </div>
        <div class="header-right">
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="goethe.html" data-tr="Goethe Hazırlık" data-en="Goethe Prep">Goethe Hazırlık</a></li>
                    <li><a href="rehber.html" data-tr="Rehber" data-en="Guide">Rehber</a></li>
                    <li><a href="youtube.html" data-tr="Videolar" data-en="Videos">Videolar</a></li>
                    <li><a href="ekle.html" data-tr="Topluluk 🌍" data-en="Community 🌍">Topluluk 🌍</a></li>
                    <li><a href="iletisim.html" class="active" style="color: #000; border: 1px solid var(--primary); background: var(--primary);" data-tr="İletişim" data-en="Contact">İletişim</a></li>
                    <li><button id="langToggle" onclick="toggleLanguage()" style="background:transparent; border:1px solid var(--border-color); color:var(--text-main); padding:8px 15px; border-radius:12px; cursor:pointer; font-weight:bold; transition:0.2s;">TR</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="page-container">
        <h1 style="color: var(--primary); margin-top: 0; margin-bottom: 10px; text-align: center; font-size: 2.2rem;" data-tr="İletişim" data-en="Contact">İletişim</h1>
        <p style="color: var(--text-muted); margin-bottom: 25px; text-align: center; font-size: 1.05rem;" data-tr="Soru, öneri veya iş birlikleri için bize ulaşın." data-en="Contact us for questions, suggestions, or collaborations.">Soru, öneri veya iş birlikleri için bize ulaşın.</p>
        <div style="background: rgba(255, 204, 0, 0.05); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 30px; border: 1px solid var(--border-color);">
            <p style="font-weight: bold; margin: 0; color: var(--text-main); font-size: 1.1rem;">✉️ medvokabeln@gmail.com</p>
        </div>
        
        <form id="contactForm">
            <div class="form-group"><label data-tr="Adınız Soyadınız" data-en="Full Name">Adınız Soyadınız</label><input type="text" data-tr-ph="Örn: Azad..." data-en-ph="e.g., Azad..." placeholder="Örn: Azad..." required></div>
            <div class="form-group"><label data-tr="E-Posta Adresiniz" data-en="Email Address">E-Posta Adresiniz</label><input type="email" placeholder="ornek@mail.com" required></div>
            <div class="form-group"><label data-tr="Mesajınız" data-en="Your Message">Mesajınız</label><textarea rows="5" data-tr-ph="Size nasıl yardımcı olabiliriz?" data-en-ph="How can we help you?" placeholder="Size nasıl yardımcı olabiliriz?" required></textarea></div>
            <button type="submit" class="submit-btn" data-tr="Mesajı Gönder 🚀" data-en="Send Message 🚀">Mesajı Gönder 🚀</button>
        </form>
    </div>

    <footer style="width: 100%; text-align: center; margin-bottom: 30px; font-size: 0.9rem; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <div style="margin-bottom: 15px;">
            <a href="datenschutz.html" style="color: var(--text-muted); text-decoration: none; margin: 0 10px; font-weight: 600;" data-tr="Gizlilik Politikası" data-en="Privacy Policy">Datenschutzerklärung</a>
            <span style="color: var(--border-color);">|</span>
            <a href="impressum.html" style="color: var(--text-muted); text-decoration: none; margin: 0 10px; font-weight: 600;" data-tr="Künye (Impressum)" data-en="Legal Notice">Impressum</a>
            <span style="color: var(--border-color);">|</span>
            <a href="iletisim.html" style="color: var(--text-muted); text-decoration: none; margin: 0 10px; font-weight: 600;" data-tr="İletişim" data-en="Contact">Kontakt</a>
        </div>
        <div style="color: var(--text-muted); font-weight: 600;">
            © 2026 <span data-tr="Oluşturan Azad | Tüm Hakları Saklıdır" data-en="Created by Azad | All Rights Reserved">Oluşturan Azad | Tüm Hakları Saklıdır</span>
        </div>
    </footer>

    <script>
        let currentLang = localStorage.getItem('medVokabeln_lang') || 'tr';

        function applyUILanguage() {
            document.querySelectorAll('[data-tr]').forEach(el => {
                el.innerHTML = el.getAttribute(`data-${currentLang}`);
            });
            document.querySelectorAll('[data-tr-ph]').forEach(el => {
                el.setAttribute('placeholder', el.getAttribute(`data-${currentLang}-ph`));
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            localStorage.setItem('medVokabeln_lang', currentLang);
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            applyUILanguage();
        }

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert(currentLang === 'en' ? 'Your message has been successfully received. We will get back to you soon!' : 'Mesajınız başarıyla alınmıştır. En kısa sürede dönüş yapacağız!');
            this.reset();
        });

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            applyUILanguage();
        });
    </script>
</body>
</html>
