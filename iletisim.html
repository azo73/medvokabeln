<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | PflegeDeutsch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
    <style>
        body { background-color: var(--bg-body, #121212); color: var(--text-main, #fff); margin: 0; }
        .modern-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 5%; background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color, #333); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .header-left { display: flex; gap: 12px; justify-content: flex-start; }
        .header-center { text-align: center; }
        .brand-logo { text-decoration: none; display: block; transition: transform 0.2s; }
        .brand-logo:hover { transform: scale(1.05); }
        .brand-logo h1 { margin: 0; font-size: 1.8rem; color: var(--text-main, #fff); letter-spacing: -0.5px; font-weight: 800; }
        .brand-logo span { color: var(--primary, #FFCC00); }
        .brand-subtitle { margin: 0; font-size: 0.75rem; color: var(--text-muted, #a3a3a3); text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; justify-content: flex-end; }
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; align-items: center;}
        .nav-links a { text-decoration: none; color: var(--text-muted, #a3a3a3); font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; padding: 8px 12px; border-radius: 12px; }
        .nav-links a:hover, .nav-links a.active { color: #000; background: var(--primary, #FFCC00); transform: translateY(-2px); }
        @media (max-width: 850px) { .modern-header { grid-template-columns: 1fr; gap: 15px; padding: 15px; } .header-left { justify-content: center; } .header-right { justify-content: center; width: 100%; } .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px; } }

        .page-container { max-width: 600px; margin: 50px auto; padding: 40px; background: var(--card-bg, #1e1e1e); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border-color, #333); }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-main, #fff); font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; border: 1px solid var(--border-color, #333); border-radius: 12px; font-family: inherit; background: var(--bg-body, #121212); color: var(--text-main, #fff); font-size: 1rem; box-sizing: border-box; transition: 0.2s;}
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary, #FFCC00); }
        .submit-btn { width: 100%; background: var(--primary, #FFCC00); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);}
        .submit-btn:hover { transform: translateY(-2px); background: #e6b800; }
    </style>
</head>
<body>

    <header class="modern-header">
        <div class="header-left">
            <a href="index.html" style="text-decoration: none; color: var(--text-main, #fff); font-weight: bold; padding: 8px 15px; background: var(--switch-bg, #2a2a2a); border-radius: 20px; font-size: 0.9rem; border: 1px solid var(--border-color, #333);">&larr; Ana Sayfa</a>
        </div>
        <div class="header-center">
            <a href="index.html" class="brand-logo">
                <h1>med-<span>vokabeln</span></h1>
            </a>
            <p class="brand-subtitle">Pflegefachkräfte Trainer</p>
        </div>
        <div class="header-right">
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="goethe.html" style="color: var(--primary, #FFCC00); border: 1px solid var(--primary, #FFCC00); background: rgba(255, 204, 0, 0.05);">Goethe Hazırlık 🇩🇪</a></li>
                    <li><a href="rehber.html">Rehber</a></li>
                    <li><a href="hakkimizda.html">Hakkımızda</a></li>
                    <li><a href="iletisim.html" class="active">İletişim</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="page-container">
        <h1 style="color: var(--primary, #FFCC00); margin-top: 0; margin-bottom: 10px; text-align: center; font-size: 2.2rem;">İletişim</h1>
        <p style="color: var(--text-muted, #a3a3a3); margin-bottom: 25px; text-align: center; font-size: 1.05rem;">Soru, öneri veya iş birlikleri için bize ulaşın.</p>
        <div style="background: rgba(255, 204, 0, 0.05); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 30px; border: 1px solid var(--border-color, #333);">
            <p style="font-weight: bold; margin: 0; color: var(--text-main, #fff); font-size: 1.1rem;">✉️ info@med-vokabeln.com</p>
        </div>
        
        <form onsubmit="event.preventDefault(); alert('Mesajınız başarıyla alınmıştır. En kısa sürede dönüş yapacağız!');">
            <div class="form-group"><label>Adınız Soyadınız</label><input type="text" placeholder="Örn: Azad..." required></div>
            <div class="form-group"><label>E-Posta Adresiniz</label><input type="email" placeholder="ornek@mail.com" required></div>
            <div class="form-group"><label>Mesajınız</label><textarea rows="5" placeholder="Size nasıl yardımcı olabiliriz?" required></textarea></div>
            <button type="submit" class="submit-btn">Mesajı Gönder 🚀</button>
        </form>
    </div>

    <footer style="width: 100%; text-align: center; margin-bottom: 30px; font-size: 0.9rem; border-top: 1px solid var(--border-color, #333); padding-top: 20px;">
        <div style="margin-bottom: 10px;">
            <a href="datenschutz.html" style="color: var(--primary, #FFCC00); text-decoration: none; margin: 0 10px; font-weight: 600;">Datenschutzerklärung</a>
            <span style="color: var(--text-muted, #a3a3a3);">|</span>
            <a href="iletisim.html" style="color: var(--primary, #FFCC00); text-decoration: none; margin: 0 10px; font-weight: 600;">Kontakt</a>
        </div>
        <div style="color: var(--text-muted, #a3a3a3); margin-top: 10px; font-weight: 600;">
            © 2026 Oluşturan Azad | Tüm Hakları Saklıdır
        </div>
    </footer>
</body>
</html>
