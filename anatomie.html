<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomi Modu | PflegeDeutsch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Anatomi Sayfasına Özel Tasarımlar */
        .back-nav {
            width: 100%; max-width: 400px; display: flex; align-items: center;
            margin-bottom: 20px; margin-top: 10px;
        }
        .btn-back {
            background: var(--card-bg); border: 2px solid var(--border-color);
            color: var(--text-dark); padding: 10px 15px; border-radius: 12px;
            text-decoration: none; font-weight: bold; transition: 0.2s;
        }
        .btn-back:hover { background: var(--switch-bg); }
        
        .anatomy-wrapper {
            position: relative; width: 200px; height: 450px; margin: 20px auto;
        }
        /* Vücut Silüeti (SVG) */
        .anatomy-svg { width: 100%; height: 100%; fill: #cbd5e1; transition: fill 0.3s; }
        body.dark-mode .anatomy-svg { fill: #334155; }
        
        /* Yanıp Sönen Etkileşim Noktaları */
        .hotspot {
            position: absolute; width: 18px; height: 18px;
            background: var(--primary); border-radius: 50%;
            cursor: pointer; transform: translate(-50%, -50%);
            box-shadow: 0 0 0 rgba(2, 132, 199, 0.4);
            animation: pulse 1.5s infinite; transition: 0.2s;
        }
        .hotspot:hover { transform: translate(-50%, -50%) scale(1.3); background: var(--success); animation: none; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(2, 132, 199, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(2, 132, 199, 0); }
            100% { box-shadow: 0 0 0 0 rgba(2, 132, 199, 0); }
        }

        /* Tıklanınca Çıkan Bilgi Kartı */
        #infoCard {
            background: var(--card-bg); width: 100%; max-width: 400px;
            padding: 20px; border-radius: 16px; border: 2px solid var(--primary);
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; margin-top: 10px; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .info-german { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .info-turkish { font-size: 1.4rem; font-weight: 600; color: var(--text-dark); margin-bottom: 15px; }
        .info-type { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onload="initTheme()">

    <div class="back-nav">
        <a href="index.html" class="btn-back">← Geri Dön</a>
        <h2 style="flex:1; text-align:center; color:var(--primary); font-size:1.4rem;">İnteraktif Anatomi</h2>
    </div>

    <p style="color:var(--text-muted); text-align:center; font-size:0.9rem;">💡 Öğrenmek istediğin bölgeye tıkla.</p>

    <div class="anatomy-wrapper">
        <svg class="anatomy-svg" viewBox="0 0 100 250">
            <circle cx="50" cy="25" r="18" /> <rect x="42" y="45" width="16" height="15" /> <rect x="30" y="60" width="40" height="70" rx="10" /> <rect x="12" y="65" width="14" height="60" rx="7" transform="rotate(10 12 65)" /> <rect x="74" y="65" width="14" height="60" rx="7" transform="rotate(-10 74 65)" /> <circle cx="9" cy="125" r="7" /> <circle cx="91" cy="125" r="7" /> <rect x="33" y="125" width="15" height="80" rx="6" /> <rect x="52" y="125" width="15" height="80" rx="6" /> <ellipse cx="40" cy="210" rx="9" ry="6" /> <ellipse cx="60" cy="210" rx="9" ry="6" /> </svg>

        <div class="hotspot" style="top: 10%; left: 50%;" onclick="showPart('Der Kopf', 'Baş / Kafa')"></div>
        <div class="hotspot" style="top: 21%; left: 50%;" onclick="showPart('Der Hals', 'Boyun')"></div>
        <div class="hotspot" style="top: 32%; left: 50%;" onclick="showPart('Die Brust', 'Göğüs')"></div>
        <div class="hotspot" style="top: 45%; left: 50%;" onclick="showPart('Der Bauch', 'Karın')"></div>
        <div class="hotspot" style="top: 38%; left: 18%;" onclick="showPart('Der Arm', 'Kol')"></div>
        <div class="hotspot" style="top: 50%; left: 9%;" onclick="showPart('Die Hand', 'El')"></div>
        <div class="hotspot" style="top: 65%; left: 40%;" onclick="showPart('Das Bein', 'Bacak')"></div>
        <div class="hotspot" style="top: 72%; left: 60%;" onclick="showPart('Das Knie', 'Diz')"></div>
        <div class="hotspot" style="top: 85%; left: 40%;" onclick="showPart('Der Fuß', 'Ayak')"></div>
    </div>

    <div id="infoCard">
        <button class="btn-speak" onclick="speakAnatomy()" title="Dinle" style="margin: 0 auto 10px auto;">🔊</button>
        <div class="info-type">Anatomie (Anatomi)</div>
        <div class="info-german" id="aGerman">...</div>
        <div class="info-turkish" id="aTurkish">...</div>
    </div>

    <script>
        // Gece modunu diğer sayfadan hatırla
        function initTheme() {
            if (localStorage.getItem('medVokabeln_theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        let currentWord = "";

        // Noktaya tıklanınca kartı göster
        function showPart(german, turkish) {
            currentWord = german;
            document.getElementById("aGerman").innerText = german;
            document.getElementById("aTurkish").innerText = turkish;
            document.getElementById("infoCard").style.display = "block";
            
            // Tıkladığı an otomatik okusun
            speakAnatomy();
        }

        // Almanca telaffuz
        function speakAnatomy() {
            if (!currentWord) return;
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'de-DE';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
