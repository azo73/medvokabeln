<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomi Modu | PflegeDeutsch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .back-nav { width: 100%; max-width: 400px; display: flex; align-items: center; margin-bottom: 20px; }
        .btn-back { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--primary); padding: 10px 15px; border-radius: 12px; text-decoration: none; font-weight: bold; }
        
        .anatomy-wrapper { position: relative; width: 200px; height: 400px; margin: 0 auto; }
        .anatomy-svg { width: 100%; height: 100%; fill: #cbd5e1; }
        body.dark-mode .anatomy-svg { fill: #334155; }
        
        .hotspot { position: absolute; width: 15px; height: 15px; background: var(--primary); border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); animation: pulse 1.5s infinite; border: 2px solid white; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(2, 132, 199, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(2, 132, 199, 0); } 100% { box-shadow: 0 0 0 0 rgba(2, 132, 199, 0); } }

        #infoCard { background: var(--card-bg); width: 100%; max-width: 400px; padding: 15px; border-radius: 16px; border: 2px solid var(--primary); text-align: center; display: none; margin-top: 15px; }
        .info-german { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .info-turkish { font-size: 1.2rem; font-weight: 600; color: var(--text-dark); }
        .btn-speak-an { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 5px;}
    </style>
</head>
<body onload="initTheme()">

    <div class="back-nav">
        <a href="index.html" class="btn-back">← Geri</a>
        <h2 style="flex:1; text-align:center; color:var(--text-dark);">İnteraktif Anatomi</h2>
    </div>

    <div class="anatomy-wrapper">
        <svg class="anatomy-svg" viewBox="0 0 100 220">
            <circle cx="50" cy="20" r="15"/>
            <rect x="45" y="35" width="10" height="10"/>
            <rect x="30" y="45" width="40" height="70" rx="10"/>
            <rect x="15" y="45" width="10" height="60" rx="5"/>
            <rect x="75" y="45" width="10" height="60" rx="5"/>
            <rect x="33" y="115" width="12" height="80" rx="6"/>
            <rect x="55" y="115" width="12" height="80" rx="6"/>
        </svg>

        <div class="hotspot" style="top: 10%; left: 50%;" onclick="showPart('der Kopf', 'Baş')"></div>
        <div class="hotspot" style="top: 25%; left: 50%;" onclick="showPart('der Hals', 'Boyun')"></div>
        <div class="hotspot" style="top: 35%; left: 50%;" onclick="showPart('das Herz', 'Kalp')"></div>
        <div class="hotspot" style="top: 45%; left: 50%;" onclick="showPart('der Magen', 'Mide')"></div>
        <div class="hotspot" style="top: 35%; left: 15%;" onclick="showPart('der Arm', 'Kol')"></div>
        <div class="hotspot" style="top: 70%; left: 35%;" onclick="showPart('das Bein', 'Bacak')"></div>
    </div>

    <div id="infoCard">
        <button class="btn-speak-an" onclick="speakAnatomy()">🔊 Dinle</button>
        <div class="info-german" id="aGerman">...</div>
        <div class="info-turkish" id="aTurkish">...</div>
    </div>

    <script>
        function initTheme() { if (localStorage.getItem('medVokabeln_theme') === 'dark') document.body.classList.add('dark-mode'); }
        let currentWord = "";
        function showPart(german, turkish) {
            currentWord = german;
            document.getElementById("aGerman").innerText = german;
            document.getElementById("aTurkish").innerText = turkish;
            document.getElementById("infoCard").style.display = "block";
            speakAnatomy();
        }
        function speakAnatomy() {
            if (!currentWord) return;
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'de-DE'; window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
