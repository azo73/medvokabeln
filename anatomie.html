<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomi Modu | PflegeDeutsch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1">
    <style>
        .back-nav { width: 100%; max-width: 400px; display: flex; align-items: center; margin-bottom: 20px; }
        .btn-back { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--primary); padding: 10px 15px; border-radius: 12px; text-decoration: none; font-weight: bold; }
        
        /* Yeni Resim ve Nokta Düzeni */
        .anatomy-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .anatomy-img { width: 100%; display: block; }
        
        .hotspot { position: absolute; width: 22px; height: 22px; background: rgba(2, 132, 199, 0.8); border: 2.5px solid white; border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); animation: pulse 1.5s infinite; transition: 0.3s; z-index: 10; }
        .hotspot:hover { background: var(--success); transform: translate(-50%, -50%) scale(1.3); }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(2, 132, 199, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(2, 132, 199, 0); } 100% { box-shadow: 0 0 0 0 rgba(2, 132, 199, 0); } }

        #infoCard { background: var(--card-bg); width: 100%; max-width: 400px; padding: 20px; border-radius: 16px; border: 2px solid var(--primary); text-align: center; display: none; margin-top: 15px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .info-german { font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .info-turkish { font-size: 1.4rem; font-weight: 600; color: var(--text-dark); }
        .btn-speak-an { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body onload="initTheme()">

    <div class="back-nav">
        <a href="index.html" class="btn-back">← Geri</a>
        <h2 style="flex:1; text-align:center; color:var(--text-dark); font-size: 1.2rem;">İnteraktif Anatomi</h2>
    </div>

    <div class="anatomy-container">
        <img src="https://raw.githubusercontent.com/azo73/medvokabeln/main/Detailed%20human%20anatomical%20model%20display.png" class="anatomy-img" alt="Anatomie">

        <div class="hotspot" style="top: 7%; left: 52%;" onclick="showPart('Das Gehirn', 'Beyin')"></div>
        <div class="hotspot" style="top: 10%; left: 45%;" onclick="showPart('Der Kopf', 'Baş')"></div>
        <div class="hotspot" style="top: 17%; left: 49%;" onclick="showPart('Der Hals', 'Boyun')"></div>
        <div class="hotspot" style="top: 26%; left: 42%;" onclick="showPart('Die Lunge', 'Akciğer')"></div>
        <div class="hotspot" style="top: 29%; left: 51%;" onclick="showPart('Das Herz', 'Kalp')"></div>
        <div class="hotspot" style="top: 34%; left: 45%;" onclick="showPart('Die Leber', 'Karaciğer')"></div>
        <div class="hotspot" style="top: 36%; left: 54%;" onclick="showPart('Der Magen', 'Mide')"></div>
        <div class="hotspot" style="top: 45%; left: 50%;" onclick="showPart('Der Darm', 'Bağırsaklar')"></div>
        <div class="hotspot" style="top: 42%; left: 24%;" onclick="showPart('Der Arm', 'Kol')"></div>
        <div class="hotspot" style="top: 55%; left: 21%;" onclick="showPart('Die Hand', 'El')"></div>
        <div class="hotspot" style="top: 70%; left: 37%;" onclick="showPart('Das Knie', 'Diz')"></div>
        <div class="hotspot" style="top: 94%; left: 43%;" onclick="showPart('Der Fuß', 'Ayak')"></div>
    </div>

    <div id="infoCard">
        <button class="btn-speak-an" onclick="speakAnatomy()">🔊 Dinle</button>
        <div class="info-german" id="aGerman">...</div>
        <div class="info-turkish" id="aTurkish">...</div>
    </div>

    <script>
        function initTheme() { if (localStorage.getItem('medVokabeln_theme') === 'dark') document.body.classList.add('dark-mode'); }
        let currentWord = "";
        function showPart(german, turkish) {
            currentWord = german;
            document.getElementById("aGerman").innerText = german;
            document.getElementById("aTurkish").innerText = turkish;
            document.getElementById("infoCard").style.display = "block";
            // Kartı görünür yapmak için otomatik kaydır
            document.getElementById("infoCard").scrollIntoView({ behavior: 'smooth' });
            speakAnatomy();
        }
        function speakAnatomy() {
            if (!currentWord) return;
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'de-DE'; window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
