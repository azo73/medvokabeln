<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günlük Antrenman 🧠 | PflegeDeutsch</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--bg-color); }
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; width: 100%; }
        .btn-back { background: var(--card-bg); border: 2px solid var(--border-color); color: var(--text-dark); padding: 8px 15px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 6px; cursor: pointer;}
        .btn-back:hover { background: var(--switch-bg); border-color: var(--primary); }
        .btn-back img { width: 18px; height: auto; border-radius: 2px; box-shadow: 0 0 2px rgba(0,0,0,0.2); }
        
        .progress-container { width: 100%; background: var(--border-color); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        
        .training-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
        
        /* Flashcard CSS */
        .flashcard-container { perspective: 1000px; width: 100%; height: 250px; margin-bottom: 30px; cursor: pointer; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .flashcard-container.flipped .flashcard { transform: rotateX(180deg); }
        
        .flashcard-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; background: var(--card-bg); border: 2px solid var(--border-color); }
        .flashcard-front { z-index: 2; }
        .flashcard-back { transform: rotateX(180deg); background: var(--switch-bg); border-color: var(--primary); }
        
        .word-category { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .word-de { font-size: 2rem; font-weight: 800; color: var(--text-dark); margin-bottom: 5px; }
        .word-type { font-size: 0.9rem; color: var(--text-muted); }
        
        .word-tr { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        .word-ex { font-size: 1rem; color: var(--text-dark); font-style: italic; line-height: 1.4; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 10px; width: 100%; }

        /* SRS Butonları */
        .action-buttons { display: none; width: 100%; gap: 10px; }
        .action-buttons.visible { display: flex; }
        .btn-srs { flex: 1; padding: 15px 5px; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-srs:active { transform: scale(0.95); }
        
        .btn-hard { background: #e74c3c; } 
        .btn-good { background: #f39c12; } 
        .btn-easy { background: #2ecc71; } 
        
        .btn-srs span { font-size: 0.75rem; opacity: 0.9; }

        /* Bitiş Ekranı */
        .finish-screen { display: none; flex-direction: column; align-items: center; text-align: center; margin-top: 50px; }
        .finish-icon { font-size: 4rem; margin-bottom: 20px; }
    </style>
</head>
<body onload="initPage()">

    <div class="top-bar">
        <a href="index.html" class="btn-back" id="uiBackBtn">← Geri</a>
        <div style="font-weight: bold; color: var(--text-muted);" id="counterText">0 / 0</div>
        <button id="langToggle" class="btn-back" onclick="toggleLanguage()">
            <img src="https://flagcdn.com/w20/tr.png" alt="TR"> TR
        </button>
    </div>
    
    <div style="padding: 0 15px; max-width: 600px; margin: 0 auto; width: 100%;">
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="training-area">
        
        <div class="flashcard-container" id="cardContainer" onclick="flipCard()">
            <div class="flashcard">
                <div class="flashcard-face flashcard-front">
                    <div class="word-category" id="fCategory">Kategori</div>
                    <div class="word-de" id="fGerman">Laden...</div>
                    <div class="word-type" id="fType">Yükleniyor</div>
                    <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-muted);" id="uiTapHint">Çevirmek için dokun 👆</p>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div class="word-tr" id="fTurkish">...</div>
                    <div class="word-ex" id="fExample">...</div>
                </div>
            </div>
        </div>

        <div class="action-buttons" id="actionButtons">
            <button class="btn-srs btn-hard" onclick="rateWord(1)">
                <div id="btnHard1">Zordu</div> <span id="btnHard2">Tekrar Et</span>
            </button>
            <button class="btn-srs btn-good" onclick="rateWord(3)">
                <div id="btnGood1">İyiydi</div> <span id="btnGood2">3 Gün Sonra</span>
            </button>
            <button class="btn-srs btn-easy" onclick="rateWord(6)">
                <div id="btnEasy1">Kolaydı</div> <span id="btnEasy2">6 Gün Sonra</span>
            </button>
        </div>

        <div class="finish-screen" id="finishScreen">
            <div class="finish-icon">🏆</div>
            <h2 style="color: var(--text-dark);" id="uiFinTitle">Tebrikler Başhekim!</h2>
            <p style="color: var(--text-muted); margin-top: 10px;" id="uiFinSub">Bugünkü antrenmanını tamamladın.<br>Beynin bu kelimeleri kalıcı hafızaya yazıyor.</p>
            <a href="index.html" style="margin-top: 30px; display: inline-block; padding: 12px 24px; background: var(--primary); color: white; border-radius: 12px; text-decoration: none; font-weight: bold;" id="uiFinBtn">Ana Sayfaya Dön</a>
        </div>

    </div>

    <script src="data.js?v=8"></script>
    <script>
        // --- DİL SÖZLÜĞÜ ---
        const uiDictTrain = {
            tr: {
                flag: '<img src="https://flagcdn.com/w20/tr.png" alt="TR"> TR',
                back: "← Geri",
                tapHint: "Çevirmek için dokun 👆",
                hard1: "Zordu", hard2: "Tekrar Et",
                good1: "İyiydi", good2: "3 Gün Sonra",
                easy1: "Kolaydı", easy2: "6 Gün Sonra",
                finTitle: "Tebrikler Başhekim!",
                finSub: "Bugünkü antrenmanını tamamladın.<br>Beynin bu kelimeleri kalıcı hafızaya yazıyor.",
                finBtn: "Ana Sayfaya Dön",
                doneCount: "Tamamlandı"
            },
            en: {
                flag: '<img src="https://flagcdn.com/w20/gb.png" alt="EN"> EN',
                back: "← Back",
                tapHint: "Tap to flip 👆",
                hard1: "Hard", hard2: "Repeat",
                good1: "Good", good2: "In 3 Days",
                easy1: "Easy", easy2: "In 6 Days",
                finTitle: "Well done, Doc!",
                finSub: "You've completed today's training.<br>Your brain is writing these words into long-term memory.",
                finBtn: "Return Home",
                doneCount: "Completed"
            }
        };

        let currentLang = localStorage.getItem('medVokabeln_lang') || 'tr';

        function applyLanguage() {
            const dict = uiDictTrain[currentLang];
            document.getElementById('langToggle').innerHTML = dict.flag;
            document.getElementById('uiBackBtn').innerText = dict.back;
            document.getElementById('uiTapHint').innerText = dict.tapHint;
            
            document.getElementById('btnHard1').innerText = dict.hard1;
            document.getElementById('btnHard2').innerText = dict.hard2;
            document.getElementById('btnGood1').innerText = dict.good1;
            document.getElementById('btnGood2').innerText = dict.good2;
            document.getElementById('btnEasy1').innerText = dict.easy1;
            document.getElementById('btnEasy2').innerText = dict.easy2;
            
            document.getElementById('uiFinTitle').innerText = dict.finTitle;
            document.getElementById('uiFinSub').innerHTML = dict.finSub;
            document.getElementById('uiFinBtn').innerText = dict.finBtn;

            // Zaten bir kart açıksa onun dilini de değiştir
            if(sessionWords.length > 0 && currentIndex < sessionWords.length) {
                loadCard(currentIndex);
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            localStorage.setItem('medVokabeln_lang', currentLang);
            applyLanguage();
        }

        function initPage() {
            if (localStorage.getItem('medVokabeln_theme') === 'dark') document.body.classList.add('dark-mode');
            applyLanguage();
            initTraining();
        }

        let sessionWords = [];
        let currentIndex = 0;
        let srsData = JSON.parse(localStorage.getItem('medVokabeln_srs')) || {};

        function initTraining() {
            const now = Date.now();
            
            let dueWords = vocabularyData.filter(word => {
                if (!srsData[word.id]) return true; 
                return srsData[word.id].nextReview <= now; 
            });

            sessionWords = dueWords.sort(() => 0.5 - Math.random()).slice(0, 20);

            if (sessionWords.length === 0) {
                showFinishScreen();
            } else {
                loadCard(0);
            }
        }

        function loadCard(index) {
            if (index >= sessionWords.length) {
                showFinishScreen();
                return;
            }

            currentIndex = index;
            const word = sessionWords[index];

            document.getElementById('fCategory').innerText = word.category;
            document.getElementById('fGerman').innerText = word.german;
            document.getElementById('fType').innerText = word.type || "";

            // DİLE GÖRE ÇEVİRİ BASIMI!
            document.getElementById('fTurkish').innerText = (currentLang === 'en' && word.english) ? word.english : word.turkish;
            document.getElementById('fExample').innerText = `"${word.example}"`;

            document.getElementById('cardContainer').classList.remove('flipped');
            document.getElementById('actionButtons').classList.remove('visible');

            document.getElementById('counterText').innerText = `${index + 1} / ${sessionWords.length}`;
            const progress = ((index) / sessionWords.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function flipCard() {
            const container = document.getElementById('cardContainer');
            if (!container.classList.contains('flipped')) {
                container.classList.add('flipped');
                setTimeout(() => {
                    document.getElementById('actionButtons').classList.add('visible');
                }, 300);
            }
        }

        function rateWord(days) {
            const wordId = sessionWords[currentIndex].id;
            const nextReviewDate = Date.now() + (days * 24 * 60 * 60 * 1000); 
            
            srsData[wordId] = {
                nextReview: nextReviewDate,
                lastRating: days
            };
            
            localStorage.setItem('medVokabeln_srs', JSON.stringify(srsData));
            loadCard(currentIndex + 1);
        }

        function showFinishScreen() {
            document.getElementById('cardContainer').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('counterText').innerText = uiDictTrain[currentLang].doneCount;
            document.getElementById('finishScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
