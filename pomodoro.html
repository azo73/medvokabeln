<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardcore Pomodoro | med-vokabeln</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        :root {
            --primary: #FFCC00; --bg-body: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; 
            --text-muted: #a3a3a3; --border-color: #333333; --switch-bg: #2a2a2a;
            --danger: #ff4757;
        }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

        /* MODERN HEADER */
        .modern-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 5%; background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
        .header-left { display: flex; gap: 12px; justify-content: flex-start; }
        .header-center { text-align: center; }
        .brand-logo { text-decoration: none; display: block; transition: transform 0.2s; }
        .brand-logo:hover { transform: scale(1.05); }
        .brand-logo h1 { margin: 0; font-size: 1.8rem; color: var(--text-main); letter-spacing: -0.5px; font-weight: 800; }
        .brand-logo span { color: var(--primary); }
        .brand-subtitle { margin: 0; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; justify-content: flex-end; }
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; align-items: center;}
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; padding: 8px 12px; border-radius: 12px; white-space: nowrap; }
        .nav-links a:hover, .nav-links a.active { color: #000; background: var(--primary); transform: translateY(-2px); }
        
        @media (max-width: 1050px) {
            .modern-header { grid-template-columns: 1fr; gap: 15px; padding: 15px; }
            .header-left, .header-right { justify-content: center; width: 100%; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px; }
        }

        /* POMODORO İÇERİĞİ */
        .pomodoro-container { max-width: 700px; margin: 50px auto; text-align: center; background: var(--card-bg); padding: 50px 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 1px solid var(--border-color); flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; --duration: 0s; }
        .pomodoro-container h2 { color: var(--primary); font-size: 2.2rem; margin-top: 0; margin-bottom: 10px; }
        .pomodoro-container p.subtitle { color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem; }

        /* YENİ NESİL DİNAMİK KUM SAATİ */
        .hourglass-wrapper { margin-bottom: 30px; display: inline-block; }
        .hourglass-svg { width: 160px; height: 160px; filter: drop-shadow(0px 0px 20px rgba(255, 204, 0, 0.4)); transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Sayaç başladığında bütünü ters döner */
        .running .hourglass-svg { transform: rotate(180deg); }

        /* Boş Olan Üst Kısım (Dönünce alta geçer ve dolar) */
        .top-sand { transform-origin: 50px 45px; transform: scaleY(0); }
        .running .top-sand { animation: fillSand var(--duration) linear forwards; animation-delay: 0.6s; }

        /* Dolu Olan Alt Kısım (Dönünce üste geçer ve boşalır) */
        .bottom-sand { transform-origin: 50px 55px; transform: scaleY(1); }
        .running .bottom-sand { animation: drainSand var(--duration) linear forwards; animation-delay: 0.6s; }

        /* Tane tane akan şelale (Dönünce aşağı doğru akar) */
        .stream { stroke-dasharray: 2 6; stroke-linecap: round; opacity: 0; transition: opacity 0.1s; }
        .running .stream { opacity: 1; transition-delay: 0.6s; animation: flowDots 0.4s linear infinite; }
        .finished .stream { opacity: 0; }

        @keyframes fillSand { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
        @keyframes drainSand { 0% { transform: scaleY(1); } 100% { transform: scaleY(0); } }
        @keyframes flowDots { 
            from { stroke-dashoffset: 8; } 
            to { stroke-dashoffset: 0; } 
        }

        /* SÜRE GÖSTERGESİ */
        .time-display { font-size: 6rem; font-weight: 800; color: var(--text-main); font-variant-numeric: tabular-nums; letter-spacing: -2px; margin-bottom: 40px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: 0.3s; }
        .time-display.finished { color: var(--primary); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* BUTONLAR */
        .timer-controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .timer-btn { padding: 15px 25px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s; background: var(--switch-bg); color: var(--text-main); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
        .timer-btn:hover { background: #333; transform: translateY(-3px); }
        
        .btn-german { background: var(--primary); color: #000; border-color: var(--primary); }
        .btn-german:hover { background: #e6b800; color: #000; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);}

        .btn-reset { background: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-reset:hover { background: rgba(255, 71, 87, 0.1); }
        
        .status-text { margin-top: 25px; color: var(--text-muted); font-size: 1rem; font-style: italic; min-height: 20px; }
    </style>
</head>
<body>

    <header class="modern-header">
        <div class="header-left">
            <a href="index.html" style="text-decoration: none; color: var(--text-main); font-weight: bold; padding: 8px 15px; background: var(--switch-bg); border-radius: 20px; font-size: 0.9rem; border: 1px solid var(--border-color);">&larr; <span data-tr="Ana Sayfa" data-en="Home">Ana Sayfa</span></a>
        </div>
        <div class="header-center">
            <a href="index.html" class="brand-logo">
                <h1>med-<span>vokabeln</span></h1>
            </a>
            <p class="brand-subtitle" data-tr="Pflegefachkräfte Trainer" data-en="Nursing Trainer">Pflegefachkräfte Trainer</p>
        </div>
        <div class="header-right">
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="goethe.html" data-tr="Goethe Hazırlık" data-en="Goethe Prep">Goethe Hazırlık</a></li>
                    <li><a href="rehber.html" data-tr="Rehber" data-en="Guide">Rehber</a></li>
                    <li><a href="pomodoro.html" class="active" style="color: #000; border: 1px solid var(--primary); background: var(--primary);" data-tr="Sayaç ⏱️" data-en="Timer ⏱️">Sayaç ⏱️</a></li>
                    <li><a href="youtube.html" data-tr="Videolar" data-en="Videos">Videolar</a></li>
                    <li><a href="iletisim.html" data-tr="İletişim" data-en="Contact">İletişim</a></li>
                    <li><button id="langToggle" onclick="toggleLanguage()" style="background:transparent; border:1px solid var(--border-color); color:var(--text-main); padding:8px 15px; border-radius:12px; cursor:pointer; font-weight:bold; transition:0.2s;">TR</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="pomodoro-container" id="pomodoroApp">
        <h2 data-tr="Hardcore Fokus" data-en="Hardcore Focus">Hardcore Fokus</h2>
        <p class="subtitle" data-tr="Dinlenme yok. Sadece hedef." data-en="No breaks. Just the goal.">Dinlenme yok. Sadece hedef.</p>

        <!-- GERÇEK ZAMANLI VE TANE TANE AKAN KUM SAATİ -->
        <div class="hourglass-wrapper">
            <svg viewBox="0 0 100 100" class="hourglass-svg">
                <defs>
                    <!-- Klipler camın iç yüzeyine sıfıra sıfır oturtuldu, boşluk kalmayacak -->
                    <clipPath id="topClip">
                        <polygon points="27,22 73,22 53,45 47,45" />
                    </clipPath>
                    <clipPath id="bottomClip">
                        <polygon points="47,55 53,55 73,78 27,78" />
                    </clipPath>
                </defs>
                
                <!-- Cam Çerçeve (Dış Hatlar) -->
                <path d="M 25 20 L 75 20 L 55 45 L 55 55 L 75 80 L 25 80 Z" fill="none" stroke="var(--primary)" stroke-width="4" stroke-linejoin="round"/>
                <line x1="20" y1="20" x2="80" y2="20" stroke="var(--primary)" stroke-width="4" stroke-linecap="round"/>
                <line x1="20" y1="80" x2="80" y2="80" stroke="var(--primary)" stroke-width="4" stroke-linecap="round"/>
                
                <!-- Başlangıçta Boş Olan Kısım -->
                <g clip-path="url(#topClip)">
                   <rect class="top-sand" x="20" y="20" width="60" height="25" fill="var(--primary)" />
                </g>
                
                <!-- Başlangıçta Dolu Olan Kısım (Tabana tam sıfır oturtuldu) -->
                <g clip-path="url(#bottomClip)">
                   <rect class="bottom-sand" x="20" y="55" width="60" height="25" fill="var(--primary)" />
                </g>
                
                <!-- Tane Tane Akan Kum Şelalesi (stroke-dasharray ile ayarlandı) -->
                <line class="stream" x1="50" y1="45" x2="50" y2="22" stroke="var(--primary)" stroke-width="2" />
            </svg>
        </div>

        <!-- SÜRE -->
        <div class="time-display" id="timeDisplay">00:00</div>

        <div class="status-text" id="statusText">Hazırsan bloğu seç ve başla!</div>

        <!-- BUTONLAR (Sadece Almanca kaldı) -->
        <div class="timer-controls">
            <button class="timer-btn btn-german" onclick="startTimer(60, 'Almanca (Grammatik/Lesen)')">
                🇩🇪 60 Dk Almanca
            </button>
            <button class="timer-btn btn-reset" onclick="resetTimer()">
                ⏹️ Durdur & Sıfırla
            </button>
        </div>
    </div>

    <script>
        // --- POMODORO VE KUM SAATİ MANTIĞI ---
        let countdown;
        let isRunning = false;
        const display = document.getElementById('timeDisplay');
        const statusText = document.getElementById('statusText');
        const appContainer = document.getElementById('pomodoroApp');

        function startTimer(minutes, modeName) {
            clearInterval(countdown);
            isRunning = true;
            
            // Süreyi saniye cinsinden alıp CSS Değişkenine gönderiyoruz (Animasyon tam bu süre kadar çalışacak)
            const durationInSeconds = minutes * 60;
            appContainer.style.setProperty('--duration', durationInSeconds + 's');
            
            // CSS'in yeni süreyi algılaması için küçük bir tetikleyici
            void appContainer.offsetWidth; 
            
            appContainer.classList.add('running');
            display.classList.remove('finished');
            
            const now = Date.now();
            const then = now + durationInSeconds * 1000;
            
            statusText.innerText = `Şu an odaklanılan: ${modeName} - Kesintiye izin verme!`;
            
            displayTimeLeft(durationInSeconds);

            countdown = setInterval(() => {
                const secondsLeft = Math.round((then - Date.now()) / 1000);
                
                if(secondsLeft < 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    appContainer.classList.remove('running');
                    display.classList.add('finished');
                    statusText.innerText = "Tebrikler! Blok tamamlandı.";
                    playAlarm();
                    return;
                }
                
                displayTimeLeft(secondsLeft);
            }, 1000);
        }

        function displayTimeLeft(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainderSeconds = seconds % 60;
            const displayValue = `${minutes < 10 ? '0' : ''}${minutes}:${remainderSeconds < 10 ? '0' : ''}${remainderSeconds}`;
            display.textContent = displayValue;
            document.title = `${displayValue} - Hardcore Fokus`;
        }

        function resetTimer() {
            clearInterval(countdown);
            isRunning = false;
            appContainer.classList.remove('running');
            display.classList.remove('finished');
            display.textContent = "00:00";
            document.title = "Hardcore Pomodoro | med-vokabeln";
            statusText.innerText = "Sayaç sıfırlandı. Yeni bir blok seçebilirsin.";
        }

        function playAlarm() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }

        // --- DİL GEÇİŞ MANTIĞI ---
        let currentLang = localStorage.getItem('medVokabeln_lang') || 'tr';

        function applyUILanguage() {
            document.querySelectorAll('[data-tr]').forEach(el => {
                el.innerHTML = el.getAttribute(`data-${currentLang}`);
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            localStorage.setItem('medVokabeln_lang', currentLang);
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            applyUILanguage();
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            applyUILanguage();
        });
    </script>
</body>
</html>
