<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemşirelik Almancası Rehberi | PflegeDeutsch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        :root {
            --primary: #FFCC00; --bg-body: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; 
            --text-muted: #a3a3a3; --border-color: #333333; --switch-bg: #2a2a2a;
        }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

        /* MODERN HEADER */
        .modern-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 5%; background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
        .header-left { display: flex; gap: 12px; justify-content: flex-start; }
        .header-center { text-align: center; }
        .brand-logo { text-decoration: none; display: block; transition: transform 0.2s; }
        .brand-logo:hover { transform: scale(1.05); }
        .brand-logo h1 { margin: 0; font-size: 1.8rem; color: var(--text-main); letter-spacing: -0.5px; font-weight: 800; }
        .brand-logo span { color: var(--primary); }
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; align-items: center;}
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; padding: 8px 12px; border-radius: 12px; }
        .nav-links a:hover, .nav-links a.active { color: #000; background: var(--primary); transform: translateY(-2px); }
        
        /* REHBER SAYFASI İÇERİĞİ */
        .blog-container { max-width: 850px; margin: 40px auto; padding: 20px; flex: 1; }
        .blog-header { text-align: center; margin-bottom: 50px; }
        .blog-header h1 { color: var(--primary); font-size: 2.5rem; margin-top: 0; margin-bottom: 15px; font-weight: 800; letter-spacing: -1px; }
        .blog-header p { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; max-width: 600px; margin: 0 auto; }
        
        .article-card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 30px; border: 1px solid var(--border-color); transition: transform 0.2s, border-color 0.2s; }
        .article-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        button.read-more { display: inline-block; padding: 10px 20px; background: var(--switch-bg); color: var(--text-main); text-decoration: none; border-radius: 12px; font-weight: 700; border: 1px solid var(--border-color); transition: 0.2s; cursor: pointer; font-family: inherit; font-size: 1rem; }
        .article-card:hover button.read-more { background: var(--primary); color: #000; border-color: var(--primary); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; padding: 40px; border-radius: 20px; border: 1px solid var(--border-color); position: relative; animation: modalFadeIn 0.3s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .close-modal { position: absolute; top: 15px; right: 25px; font-size: 2.5rem; color: var(--text-muted); cursor: pointer; transition: color 0.2s; line-height: 1; }
        .close-modal:hover { color: var(--primary); }
    </style>
</head>
<body>

    <header class="modern-header">
        <div class="header-left">
            <a href="index.html" style="text-decoration: none; color: var(--text-main); font-weight: bold; padding: 8px 15px; background: var(--switch-bg); border-radius: 20px; font-size: 0.9rem; border: 1px solid var(--border-color);">&larr; <span data-tr="Ana Sayfa" data-en="Home">Ana Sayfa</span></a>
        </div>
        <div class="header-center">
            <a href="index.html" class="brand-logo"><h1>med-<span>vokabeln</span></h1></a>
        </div>
        <div class="header-right">
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="pomodoro.html" data-tr="Sayaç ⏱️" data-en="Timer ⏱️">Sayaç ⏱️</a></li>
                    <li><a href="rehber.html" class="active" style="color: #000; border: 1px solid var(--primary); background: var(--primary);" data-tr="Rehber" data-en="Guide">Rehber</a></li>
                    <li><button id="langToggle" onclick="toggleLanguage()" style="background:transparent; border:1px solid var(--border-color); color:var(--text-main); padding:8px 15px; border-radius:12px; cursor:pointer; font-weight:bold;">TR</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="blog-container">
        <div class="blog-header">
            <h1 data-tr="Almanya'da Hemşirelik Rehberi" data-en="Nursing Guide in Germany">Almanya'da Hemşirelik Rehberi</h1>
        </div>
        <!-- Kartlar burada -->
    </div>

    <!-- Sorumluluk Reddi Modal -->
    <div id="disclaimerModal" style="display: none; z-index: 9999; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(8px);">
        <div style="background: #1e1e1e; border: 1px solid #333; padding: 40px; border-radius: 20px; text-align: center; max-width: 600px; color: #fff;">
            <h2 data-tr="Önemli Uyarı" data-en="Important Notice">Önemli Uyarı</h2>
            <p data-tr="Bu web sitesinde yer alan tıbbi bilgiler, Almanca öğrenme amaçlıdır. Profesyonel tıbbi tavsiye yerine geçmez." 
               data-en="The medical information on this website is for language learning purposes. It does not replace professional medical advice.">
               Bu web sitesinde yer alan tıbbi bilgiler, Almanca öğrenme amaçlıdır. Profesyonel tıbbi tavsiye yerine geçmez.
            </p>
            <button onclick="acceptDisclaimer()" style="margin: 20px auto; padding: 12px 25px; background: #FFCC00; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;" data-tr="Anladım" data-en="Understood">Anladım</button>
        </div>
    </div>

    <script>
        let currentLang = localStorage.getItem('medVokabeln_lang') || 'tr';

        function applyUILanguage() {
            document.querySelectorAll('[data-tr]').forEach(el => {
                el.innerHTML = el.getAttribute(`data-${currentLang}`);
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            localStorage.setItem('medVokabeln_lang', currentLang);
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            applyUILanguage();
        }

        function acceptDisclaimer() {
            document.getElementById('disclaimerModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            localStorage.setItem('medVokabeln_disclaimerAccepted', 'true');
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            applyUILanguage();
            if (!localStorage.getItem('medVokabeln_disclaimerAccepted')) {
                document.getElementById('disclaimerModal').style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        });

        function openModal(id) { document.getElementById(id).style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
