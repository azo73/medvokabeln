<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>med-vokabeln.com | PflegeDeutsch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>med-vokabeln.com</h1>
        <p>Pflegefachkräfte Vokabeltrainer</p>
    </header>

    <div class="mode-switch">
        <button class="mode-btn active" id="btnFlashcard" onclick="switchMode('flashcard')">📇 Kartlar</button>
        <button class="mode-btn" id="btnQuiz" onclick="switchMode('quiz')">✍️ Sınav Ol</button>
    </div>

   <div class="dashboard">
        <select id="categorySelect" onchange="changeCategory()">
            <option value="Alle">Tüm Kategoriler</option>
            <option value="Allgemein">Genel Hastane</option>
            <option value="Anatomie">Anatomi</option>
            <option value="Aktion">Fiiller / Eylemler</option>
        </select>
        
        <div class="stats-container">
            <div class="streak" id="streakText" title="Günlük Serin">🔥 0</div>
            <div class="progress" id="progressText">0 / 0 Öğrenildi</div>
        </div>
    </div>

    <div id="flashcardSection">
        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="myCard">
                <div class="card-face card-front">
                    <div class="learned-badge" id="frontBadge">✅ ÖĞRENİLDİ</div>
                    <button class="btn-speak" onclick="speakWord(event)" title="Almanca Telaffuzu Dinle">🔊</button>
                    <div class="word-type" id="wordType">...</div>
                    <div class="word-german" id="germanWord">Yükleniyor...</div>
                </div>
                <div class="card-face card-back">
                    <div class="learned-badge" id="backBadge">✅ ÖĞRENİLDİ</div>
                    <div class="word-turkish" id="turkishWord">...</div>
                    <div class="example-sentence" id="exampleSentence">...</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="action-btn" onclick="prevWord()">&larr; Önceki</button>
            <button class="action-btn btn-learn" onclick="toggleLearned()" id="learnBtn">✅ Öğrendim</button>
            <button class="action-btn" onclick="nextWord()">Sonraki &rarr;</button>
        </div>
        <p class="instruction">💡 Çevirmek için karta dokun.</p>
    </div>

    <div id="quizSection">
        <div class="quiz-card">
            <div class="quiz-hint">Bu kelimenin anlamı nedir?</div>
            <div class="quiz-question" id="quizWord">Yükleniyor...</div>
            <div class="quiz-options" id="quizOptionsContainer"></div>
            <div class="quiz-feedback" id="quizFeedback"></div>
            <button class="btn-next-quiz" id="nextQuizBtn" onclick="generateQuizQuestion()">Sonraki Soru &rarr;</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
